include required(classpath("application"))

# Cromwell 92's default docker hash lookup uses a hardcoded registry allowlist
# (Docker Hub, GCR, Quay, ECR) that excludes ghcr.io. When the lookup fails,
# Cromwell hits a coercion bug (broadinstitute/cromwell#7846) that fails the
# task. Switching to local mode shells out to the docker CLI for the hash,
# which accepts any registry — and since the image is pre-pulled on the
# runner, the lookup succeeds without contacting any registry directly.
docker {
  hash-lookup {
    method = "local"
  }
}
